services:
  backup:
    image: ubuntu:26.04
    container_name: backup
    stdin_open: true    # Garde le stdin ouvert (-i)
    tty: true           # Alloue un terminal (-t)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /media/HDD-Storage/docker-data/ubuntu/wireguard:/etc/wireguard:ro    # config wireguard
      - /media/HDD-Storage/docker-data/ubuntu/ssh:/root/.ssh                 # clé SSH pour auth SFTP sans mot de passe
      - /media/HDD-Storage:/hdd-01:ro                                        # accès disque local
      - /media/HDD-Storage/docker-data/ubuntu/logs:/var/log/backup           # logs persistants
      - /media/HDD-Storage/docker-data/ubuntu/rclone:/root/.config/rclone:ro # config rclone

    command:
      - bash
      - -c
      - |
          apt-get update -qq &&
          DEBIAN_FRONTEND=noninteractive TZ=Europe/Paris apt-get install -y -qq \
            openssh-client tzdata wireguard wireguard-tools rsync cron iproute2 curl rclone || true
          wg-quick up wg0 || true
          curl -fsSL https://raw.githubusercontent.com/ronanlambare/homelab-backup/main/backup.sh -o /backup.sh
          chmod +x /backup.sh
          chmod 700 /root/.ssh
          chmod 600 /root/.ssh/*
          # backup à midi
          echo '0 12 * * * /backup.sh >> /var/log/backup/backup.log 2>&1' | crontab -
          # nettoyage des logs > 7 jours à 1h du matin
          echo '0 1 * * * find /var/log/backup -name "*.log" -mtime +7 -delete' >> /tmp/crontab.tmp
          crontab /tmp/crontab.tmp
          cron
          tail -f /dev/null
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}